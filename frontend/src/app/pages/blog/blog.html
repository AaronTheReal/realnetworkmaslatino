<div class="min-h-screen bg-gray-50 py-12 lg:py-16 2xl:py-24 px-4 sm:px-6 lg:px-8 xl:px-12">

  <!-- Título -->
  <div class="max-w-7xl 2xl:max-w-screen-2xl mx-auto mb-10 2xl:mb-14">
    <h1 class="text-4xl 2xl:text-6xl font-bold text-gray-900 text-center md:text-left">
      Press
    </h1>
  </div>

  <!-- Grid de tarjetas -->
  <div class="max-w-7xl 2xl:max-w-screen-2xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 lg:gap-10 2xl:gap-12">

    <!-- ===================== SKELETON LOADER ===================== -->
    <ng-container *ngIf="loading()">
      <div *ngFor="let s of skeletons"
           class="block bg-white rounded-3xl shadow-sm overflow-hidden animate-pulse">
        <!-- Imagen -->
        <div class="w-full h-52 2xl:h-64 bg-gray-200"></div>
        <!-- Contenido -->
        <div class="p-5 2xl:p-6">
          <!-- Fecha + categorías -->
          <div class="flex items-center gap-2 mb-4">
            <div class="h-6 w-24 bg-gray-200 rounded-full"></div>
            <div class="h-6 w-16 bg-gray-200 rounded-full"></div>
          </div>
          <!-- Título -->
          <div class="h-5 w-11/12 bg-gray-200 rounded mb-2.5"></div>
          <div class="h-5 w-3/4 bg-gray-200 rounded mb-5"></div>
          <!-- Descripción -->
          <div class="space-y-2.5">
            <div class="h-3.5 w-full bg-gray-200 rounded"></div>
            <div class="h-3.5 w-full bg-gray-200 rounded"></div>
            <div class="h-3.5 w-2/3 bg-gray-200 rounded"></div>
          </div>
        </div>
      </div>
    </ng-container>

    <!-- ===================== TARJETAS REALES ===================== -->
    <a *ngFor="let post of pressPosts()"
       [routerLink]="['/blog', post.slug]"
       class="group block cursor-pointer bg-white rounded-3xl shadow-sm hover:shadow-md transition-shadow duration-300 overflow-hidden">

      <!-- Imagen -->
      <div class="relative h-52 2xl:h-64 overflow-hidden rounded-t-3xl">
        <img
          [ngSrc]="post.meta?.image || 'https://picsum.photos/id/1015/600/400'"
          [alt]="post.title"
          fill
          class="object-cover transition-transform duration-500 group-hover:scale-105">
      </div>

      <!-- Contenido -->
      <div class="p-5 2xl:p-6">

        <!-- Fecha + categorías (máx 2 + badge) -->
        <div class="flex flex-wrap items-center gap-2 mb-3">
          <span class="bg-amber-100 text-amber-700 px-3 py-1 rounded-full text-xs 2xl:text-sm font-semibold whitespace-nowrap">
            {{ post.createdAt | date:'d MMM yyyy' | uppercase }}
          </span>
          <span class="text-gray-300 text-xs">·</span>
          <ng-container *ngFor="let cat of (post.categories || []).slice(0, 2)">
            <span class="bg-gray-100 text-gray-600 px-2 py-1 rounded-full text-xs 2xl:text-sm font-medium whitespace-nowrap">
              {{ cat.name }}
            </span>
          </ng-container>
          <span *ngIf="(post.categories || []).length > 2"
                class="bg-gray-200 text-gray-500 px-2 py-1 rounded-full text-xs 2xl:text-sm font-medium whitespace-nowrap">
            +{{ (post.categories || []).length - 2 }}
          </span>
        </div>

        <!-- Título -->
        <h2 class="font-bold text-xl 2xl:text-2xl text-gray-900 leading-tight mb-2 line-clamp-2">
          {{ post.title }}
        </h2>

        <!-- Descripción -->
        <p class="text-gray-500 text-sm 2xl:text-base leading-relaxed line-clamp-3">
          {{ post.extracto || post.summary || 'Descubre más sobre este tema...' }}
        </p>

      </div>
    </a>

    <!-- ===================== ESTADO VACÍO ===================== -->
    <div *ngIf="!loading() && pressPosts().length === 0"
         class="col-span-full text-center py-20 text-gray-400">
      <p class="text-lg">No hay publicaciones disponibles por el momento.</p>
    </div>

  </div>
</div>
