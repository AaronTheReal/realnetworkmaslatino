<section class="w-full bg-white px-4 py-10">
  <div
    class="mx-auto flex max-w-[1650px] flex-col items-stretch justify-center gap-[28px] lg:flex-row lg:gap-[32px]"
  >

    <!-- CARD 1 -->
    <article
      class="
        relative
        flex
        w-full
        max-w-[760px]
        flex-col
        overflow-hidden
        rounded-[34px]
        bg-[#905cf5]

        px-[32px]
        pt-[34px]
        pb-[26px]

        min-h-[330px]

        sm:px-[56px]
        sm:pt-[46px]
        sm:pb-[30px]

        lg:min-h-[370px]
      "
    >
      <div class="flex h-full flex-col">

        <!-- TOP -->
        <div class="flex items-start justify-between">

          <!-- TITLE -->
          <h3
            class="
              mt-4
              max-w-[48%]
              text-left
              text-[clamp(2.2rem,3.7vw,4.2rem)]
              font-extrabold
              leading-[0.90]
              tracking-[-0.05em]
              text-white
              sm:mt-8
            "
          >
            Partner
            <br />
            With Us
          </h3>

          <!-- ICON -->
          <div
            class="
              mr-[12px]
              mt-[4px]
              flex
              h-[95px]
              w-[95px]
              shrink-0
              items-center
              justify-center

              sm:mr-[34px]
              sm:mt-[10px]
              sm:h-[125px]
              sm:w-[125px]

              lg:h-[145px]
              lg:w-[145px]
            "
          >
            <img
              src="assets/parter-us/icono1.png"
              alt="icon"
              class="h-full w-full object-contain"
            />
          </div>
        </div>

        <!-- FLEX SPACE -->
        <div class="flex-1 min-h-[44px] sm:min-h-[56px]"></div>

        <!-- BUTTON - WORK WITH US (VERSIÓN CORREGIDA) -->
    <div class="flex justify-center">
      <a
        [routerLink]="['/contact']"
        class="
          flex
          h-[64px]
          w-[250px]
          items-center
          justify-center
          rounded-full
          bg-white
          text-black
          text-[clamp(1.3rem,1.5vw,1.85rem)]
          font-extrabold
          leading-none
          transition-all
          hover:bg-white/90
          active:scale-95
          cursor-pointer

          sm:h-[72px]
          sm:w-[300px]
        "
      >
        work with us
      </a>
    </div>
      </div>

      <!-- CORNER -->
      <div
        class="
          absolute
          right-0
          top-0
          h-[44px]
          w-[44px]
          rounded-bl-[22px]
          rounded-tr-[34px]
          bg-white/20
        "
      ></div>
    </article>

    <!-- CARD 2 -->
    <article
      class="
        relative
        flex
        w-full
        max-w-[760px]
        flex-col
        overflow-hidden
        rounded-[34px]
        bg-[#ed5536]

        px-[32px]
        pt-[34px]
        pb-[26px]

        min-h-[330px]

        sm:px-[56px]
        sm:pt-[46px]
        sm:pb-[30px]

        lg:min-h-[370px]
      "
    >
      <div class="flex h-full flex-col">

        <!-- TOP -->
        <div class="flex items-start justify-between">

          <!-- TITLE -->
          <h3
            class="
              mt-4
              max-w-[52%]
              text-left
              text-[clamp(2.15rem,3.5vw,4rem)]
              font-extrabold
              leading-[0.90]
              tracking-[-0.05em]
              text-white
              sm:mt-8
            "
          >
            Join the
            <br />
            Creator
            <br />
            Network
          </h3>

          <!-- ICON -->
          <div
            class="
              mr-[4px]
              mt-[10px]
              flex
              h-[100px]
              w-[100px]
              shrink-0
              items-center
              justify-center

              sm:mr-[22px]
              sm:mt-[18px]
              sm:h-[136px]
              sm:w-[136px]

              lg:h-[150px]
              lg:w-[150px]
            "
          >
            <img
              src="assets/parter-us/icono2.png"
              alt="icon"
              class="h-full w-full object-contain"
            />
          </div>
        </div>

        <!-- REDUCED SPACE -->
        <div class="flex-1 min-h-[24px] sm:min-h-[34px]"></div>

        <!-- BUTTON -->
        <div class="flex justify-center">
          <button
            class="
              flex
              h-[64px]
              w-[250px]
              items-center
              justify-center
              rounded-full
              bg-white
              text-black
              text-[clamp(1.25rem,1.45vw,1.8rem)]
              font-extrabold
              leading-none
              transition-colors
              hover:bg-white/90

              sm:h-[72px]
              sm:w-[300px]
            "
          >
            join us
          </button>
        </div>
      </div>

      <!-- CORNER -->
      <div
        class="
          absolute
          right-0
          top-0
          h-[44px]
          w-[44px]
          rounded-bl-[22px]
          rounded-tr-[34px]
          bg-white/20
        "
      ></div>
    </article>

  </div>
</section>
