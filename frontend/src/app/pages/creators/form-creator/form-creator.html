<!-- CREATOR APPLICATION FORM -->
<section class="w-full bg-white py-16 px-5 sm:px-8">
  <main class="relative mx-auto w-full max-w-[920px] text-neutral-900 antialiased">

    <!-- Decorative corner curl -->
    <svg 
      class="absolute top-0 right-0 w-16 h-16 pointer-events-none opacity-20 z-0" 
      viewBox="0 0 64 64" 
      aria-hidden="true"
    >
      <path d="M64 0 C 64 28, 48 48, 20 56 C 40 40, 52 24, 56 0 Z" fill="#D1D5DB"/>
    </svg>

    <!-- TITLE -->
    <h2 class="text-4xl sm:text-5xl md:text-6xl font-extrabold text-center text-black uppercase tracking-tight leading-tight relative z-10">
      Join the Creator Network
    </h2>

    <!-- Intro paragraph -->
    <p class="mt-6 sm:mt-8 mx-auto max-w-[560px] text-center text-sm sm:text-[13px] leading-[1.65] text-neutral-800 relative z-10">
      Apply to become one of the local creators helping Más Latino cover culture, food, soccer, and city life during World Cup 2026.
    </p>

    <!-- FORM -->
    <form 
      action="https://formspree.io/f/xwpqbnrj"
      method="POST"
      class="mt-10 sm:mt-14 mx-auto max-w-[780px] space-y-4 sm:space-y-5 relative z-10"
    >

      <!-- Hidden form type -->
      <input 
        type="hidden" 
        name="form_type" 
        value="Creator Network Application"
      />

      <input 
        type="hidden" 
        name="_subject" 
        value="New Creator Network Application"
      />

      <!-- Row 1 -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4 sm:gap-5">
        <input 
          type="text" 
          name="name" 
          placeholder="Name"
          required
          class="w-full border border-[#111] rounded-full bg-white px-6 py-4 text-sm placeholder:text-[#111] focus:shadow-[0_0_0_3px_rgba(242,107,58,.18)] focus:border-[#111] outline-none transition-all" 
        />

        <input 
          type="email" 
          name="email" 
          placeholder="Email"
          required
          class="w-full border border-[#111] rounded-full bg-white px-6 py-4 text-sm placeholder:text-[#111] focus:shadow-[0_0_0_3px_rgba(242,107,58,.18)] focus:border-[#111] outline-none transition-all" 
        />
      </div>

      <!-- Row 2 -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4 sm:gap-5">
        <input 
          type="text" 
          name="city" 
          placeholder="City"
          required
          class="w-full border border-[#111] rounded-full bg-white px-6 py-4 text-sm placeholder:text-[#111] focus:shadow-[0_0_0_3px_rgba(242,107,58,.18)] focus:border-[#111] outline-none transition-all" 
        />

        <input 
          type="text" 
          name="main_platform" 
          placeholder="Main platform: Instagram, TikTok, YouTube..."
          class="w-full border border-[#111] rounded-full bg-white px-6 py-4 text-sm placeholder:text-[#111] focus:shadow-[0_0_0_3px_rgba(242,107,58,.18)] focus:border-[#111] outline-none transition-all" 
        />
      </div>

      <!-- Row 3 -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4 sm:gap-5">
        <input 
          type="url" 
          name="social_link" 
          placeholder="Social media link"
          required
          class="w-full border border-[#111] rounded-full bg-white px-6 py-4 text-sm placeholder:text-[#111] focus:shadow-[0_0_0_3px_rgba(242,107,58,.18)] focus:border-[#111] outline-none transition-all" 
        />

        <input 
          type="text" 
          name="content_category" 
          placeholder="Content type: food, soccer, lifestyle..."
          class="w-full border border-[#111] rounded-full bg-white px-6 py-4 text-sm placeholder:text-[#111] focus:shadow-[0_0_0_3px_rgba(242,107,58,.18)] focus:border-[#111] outline-none transition-all" 
        />
      </div>

      <!-- Short textarea -->
      <textarea 
        name="why_join" 
        rows="3" 
        placeholder="Why do you want to join the Más Latino Creator Network?"
        required
        class="w-full border border-[#111] rounded-3xl bg-white px-6 py-5 text-sm placeholder:text-[#111] focus:shadow-[0_0_0_3px_rgba(242,107,58,.18)] outline-none resize-none transition-all"
      ></textarea>

      <!-- Submit -->
      <div class="pt-6 sm:pt-8 flex justify-center">
        <button 
          type="submit"
          class="bg-red-500 hover:bg-[#E85A29] active:translate-y-px text-white rounded-full px-10 py-3.5 text-[15px] font-medium tracking-[0.01em] shadow-[0_6px_14px_-6px_rgba(242,107,58,.55)] transition-all"
        >
          Apply Now
        </button>
      </div>

    </form>

  </main>
</section>
