<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Los Mejores Restaurantes</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  :root{
    --purple:#8B3FE8;
    --purple-deep:#7A2EE0;
    --red:#F03E3E;
    --orange-red:#EF4435;
    --grape:#9333EA;
    --green:#1FC16B;
    --amber:#F5A524;
    --ink:#0A0A0A;
    --muted:#6B7280;
    --line:#E5E7EB;
  }
  html,body{font-family:'Inter',ui-sans-serif,system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif;}
  .font-display{font-family:'Inter',sans-serif; letter-spacing:-0.02em;}
  .hero-card{
    background:linear-gradient(180deg,#9747FF 0%,#8B3FE8 100%);
    box-shadow:0 18px 40px -18px rgba(139,63,232,.55);
  }
  .pill-shadow{box-shadow:0 6px 14px -6px rgba(0,0,0,.18);}
  .card-shadow{box-shadow:0 1px 2px rgba(0,0,0,.04), 0 8px 22px -10px rgba(0,0,0,.12);}
  .btn-visit{box-shadow:0 6px 14px -8px rgba(0,0,0,.45);}
  .search-shadow{box-shadow:0 4px 14px -8px rgba(0,0,0,.18);}
  /* hide horizontal scrollbar on chip row when it scrolls on tiny screens */
  .no-scrollbar::-webkit-scrollbar{display:none;}
  .no-scrollbar{scrollbar-width:none;}
  /* subtle shine on cloche */
  .cloche-shine{filter:drop-shadow(0 12px 18px rgba(0,0,0,.25));}
</style>
</head>
<body class="bg-white text-neutral-900 antialiased">

  <main class="mx-auto w-full max-w-[460px] sm:max-w-2xl md:max-w-4xl lg:max-w-5xl px-4 sm:px-6 pt-5 pb-16">

    <!-- HERO CARD -->
    <section class="hero-card relative overflow-hidden rounded-[28px] sm:rounded-[32px] px-6 sm:px-8 md:px-10 py-7 sm:py-9 md:py-10">
      <p class="text-white/95 text-[13px] sm:text-sm font-semibold tracking-wide">Para comer</p>
      <h1 class="font-display text-white font-extrabold leading-[0.95] tracking-tight mt-1
                 text-[34px] sm:text-5xl md:text-6xl">
        LOS MEJORES<br/>RESTAURANTES
      </h1>

      <!-- Cloche illustration (placeholder, original SVG) -->
      <div class="absolute right-4 sm:right-6 md:right-10 top-1/2 -translate-y-1/2 w-[88px] sm:w-[120px] md:w-[150px] cloche-shine">
        <svg viewBox="0 0 200 200" class="w-full h-auto" aria-hidden="true">
          <defs>
            <linearGradient id="dome" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#F5E9FF"/>
              <stop offset="45%" stop-color="#C9A8F0"/>
              <stop offset="100%" stop-color="#7A45B8"/>
            </linearGradient>
            <linearGradient id="plate" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#E8D6FF"/>
              <stop offset="100%" stop-color="#7A45B8"/>
            </linearGradient>
            <radialGradient id="knob" cx="0.5" cy="0.4" r="0.6">
              <stop offset="0%" stop-color="#FFFFFF"/>
              <stop offset="100%" stop-color="#A887D6"/>
            </radialGradient>
          </defs>
          <!-- dome -->
          <path d="M30 120 C 30 60, 170 60, 170 120 Z" fill="url(#dome)"/>
          <!-- shine on dome -->
          <path d="M55 75 C 80 55, 120 55, 130 70" stroke="#FFFFFF" stroke-opacity="0.55" stroke-width="6" fill="none" stroke-linecap="round"/>
          <!-- knob -->
          <circle cx="100" cy="62" r="11" fill="url(#knob)"/>
          <!-- plate -->
          <ellipse cx="100" cy="125" rx="78" ry="10" fill="url(#plate)"/>
          <!-- shadow under plate -->
          <ellipse cx="100" cy="138" rx="60" ry="5" fill="#000" fill-opacity="0.15"/>
        </svg>
      </div>
    </section>

    <!-- DESCRIPTION -->
    <p class="mt-8 sm:mt-10 mx-auto max-w-[460px] text-center text-[12.5px] sm:text-sm leading-[1.65] text-neutral-700">
      Lorem ipsum dolor sit amet, consectetuer adipiscing elit, sed diam
      nonummy nibh euismod tincidunt ut laoreet dolore magna aliquam erat
      volutpat. Ut wisi Lorem ipsum dolor sit amet, consectetuer adipiscing
      elit, sed diam nonummy nibh euismod tincidunt ut laoreet
    </p>

    <!-- SEARCH -->
    <div class="mt-7 flex justify-center">
      <label class="search-shadow flex items-center gap-2 w-full max-w-[260px] sm:max-w-[300px] h-11 rounded-full border border-neutral-200 bg-white px-5">
        <input id="searchInput" type="text" placeholder="Buscar" class="flex-1 bg-transparent outline-none text-[13px] placeholder:text-neutral-500" />
        <svg viewBox="0 0 24 24" class="w-4 h-4 text-neutral-500" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5" stroke-linecap="round"/></svg>
      </label>
    </div>

    <!-- CATEGORY CHIPS -->
    <div class="mt-6 flex flex-wrap justify-center gap-x-3 gap-y-3" id="chipRow">
      <button data-cat="americanos" class="chip pill-shadow rounded-full px-5 h-9 text-[13px] font-bold text-white" style="background:#F03E3E">Americanos</button>
      <button data-cat="italianos"  class="chip pill-shadow rounded-full px-5 h-9 text-[13px] font-bold text-white" style="background:#9333EA">Italianos</button>
      <button data-cat="latinos"    class="chip pill-shadow rounded-full px-5 h-9 text-[13px] font-bold text-white" style="background:#1FC16B">Latinos</button>
      <button data-cat="asiaticos"  class="chip pill-shadow rounded-full px-5 h-9 text-[13px] font-bold text-white" style="background:#F5A524">Asiaticos</button>
      <button data-cat="otros"      class="chip pill-shadow rounded-full px-5 h-9 text-[13px] font-bold text-white" style="background:#EF4435">Otros</button>
    </div>

    <!-- TABS -->
    <div class="mt-8 flex items-center justify-center gap-6 text-[12.5px] tracking-[0.12em]">
      <button data-tab="recommended" class="tab font-extrabold text-neutral-900">RECOMMENDED</button>
      <button data-tab="near"        class="tab font-semibold text-neutral-400">NEAR ME</button>
    </div>

    <!-- GRID -->
    <section id="grid" class="mt-6 grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3 sm:gap-4">
      <!-- cards injected by JS -->
    </section>

  </main>

<script>
  /* ----- Data ----- */
  const PLACES = [
    {name:'Beacon Hill', place:'Place here', cat:'americanos'},
    {name:'Beacon Hill', place:'Place here', cat:'italianos'},
    {name:'Beacon Hill', place:'Place here', cat:'latinos'},
    {name:'Beacon Hill', place:'Place here', cat:'asiaticos'},
    {name:'Beacon Hill', place:'Place here', cat:'otros'},
    {name:'Beacon Hill', place:'Place here', cat:'americanos'},
    {name:'Beacon Hill', place:'Place here', cat:'italianos'},
    {name:'Beacon Hill', place:'Place here', cat:'latinos'},
    {name:'Beacon Hill', place:'Place here', cat:'asiaticos'},
    {name:'Beacon Hill', place:'Place here', cat:'otros'},
    {name:'Beacon Hill', place:'Place here', cat:'americanos'},
    {name:'Beacon Hill', place:'Place here', cat:'italianos'},
  ];

  /* ----- Render ----- */
  const grid = document.getElementById('grid');
  function render(filter = ''){
    grid.innerHTML = '';
    const list = PLACES.filter(p => {
      const matchCat = !state.cat || p.cat === state.cat;
      const matchText = !filter || p.name.toLowerCase().includes(filter.toLowerCase());
      return matchCat && matchText;
    });

    if(!list.length){
      grid.innerHTML = `<div class="col-span-full text-center text-sm text-neutral-500 py-10">No results</div>`;
      return;
    }

    for(const p of list){
      const el = document.createElement('article');
      el.className = 'card-shadow group rounded-2xl border border-neutral-200 bg-white p-2.5 sm:p-3 transition hover:-translate-y-0.5 hover:shadow-lg';
      el.innerHTML = `
        <div class="aspect-square w-full rounded-xl bg-black overflow-hidden relative">
          <div class="absolute inset-0 opacity-0 group-hover:opacity-100 transition bg-gradient-to-t from-black/60 via-black/0 to-transparent"></div>
        </div>
        <div class="pt-2.5 px-1">
          <h3 class="text-[13px] font-bold leading-tight">${p.name}</h3>
          <p class="text-[11px] text-neutral-500 -mt-0.5">${p.place}</p>
        </div>
        <div class="mt-2.5 flex justify-center pb-1">
          <button class="btn-visit rounded-full bg-black text-white text-[11px] font-semibold px-5 h-7 hover:bg-neutral-800 active:scale-[0.98] transition">Visit web</button>
        </div>
      `;
      grid.appendChild(el);
    }
  }

  /* ----- State + interactivity ----- */
  const state = { cat:null, tab:'recommended', q:'' };

  // Chips toggle
  document.querySelectorAll('.chip').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const cat = btn.dataset.cat;
      const active = state.cat === cat;
      state.cat = active ? null : cat;
      document.querySelectorAll('.chip').forEach(b=>{
        b.classList.toggle('ring-2', b.dataset.cat === state.cat);
        b.classList.toggle('ring-offset-2', b.dataset.cat === state.cat);
        b.classList.toggle('ring-black/30', b.dataset.cat === state.cat);
        b.style.transform = (b.dataset.cat === state.cat) ? 'scale(1.04)' : 'scale(1)';
        b.style.transition = 'transform .15s ease';
      });
      render(state.q);
    });
  });

  // Tabs
  document.querySelectorAll('.tab').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      state.tab = btn.dataset.tab;
      document.querySelectorAll('.tab').forEach(b=>{
        const on = b.dataset.tab === state.tab;
        b.classList.toggle('font-extrabold', on);
        b.classList.toggle('text-neutral-900', on);
        b.classList.toggle('font-semibold', !on);
        b.classList.toggle('text-neutral-400', !on);
      });
      render(state.q);
    });
  });

  // Search
  document.getElementById('searchInput').addEventListener('input', e=>{
    state.q = e.target.value;
    render(state.q);
  });

  render();
</script>
</body>
</html>
