
  <!-- HERO "LOS MEJORES RESTAURANTES" -->

  <!-- GRID DINÁMICO -->
  <section class="mt-8">
    <div *ngIf="loading()" class="text-center py-12">
      <p class="text-lg">Cargando los mejores restaurantes de {{ city().name }}...</p>
    </div>

    <div *ngIf="error()" class="text-center py-12 text-red-600">
      {{ error() }}
    </div>

    <div *ngIf="!loading() && !error()" 
         class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4 sm:gap-6">
      
      <article *ngFor="let resto of restaurants()" 
               class="group rounded-3xl border border-neutral-200 bg-white p-4 sm:p-5 transition hover:-translate-y-1 hover:shadow-xl shadow-[0_1px_3px_rgba(0,0,0,0.05),0_10px_28px_-12px_rgba(0,0,0,0.14)]">

        <!-- Foto -->
        <div class="aspect-square w-full rounded-2xl bg-neutral-200 overflow-hidden relative">
          <img 
            *ngIf="resto.photos && resto.photos.length > 0"
            [src]="resto.photos[0].url" 
            [alt]="resto.name"
            class="w-full h-full object-cover transition group-hover:scale-105"
          >
          <div class="absolute inset-0 opacity-0 group-hover:opacity-100 transition bg-gradient-to-t from-black/70 via-black/10 to-transparent"></div>
        </div>

        <!-- Info -->
        <div class="pt-4 px-1">
          <h3 class="text-base font-bold leading-tight">{{ resto.name }}</h3>
          <p class="text-sm text-neutral-500 line-clamp-2">{{ resto.formattedAddress }}</p>
          
          <div class="mt-3 flex items-center gap-2">
            <span class="text-yellow-500 text-xl">★</span>
            <span class="font-semibold">{{ resto.rating }}</span>
            <span *ngIf="resto.priceLevel" class="text-neutral-400 text-sm">
              • {{ resto.priceLevel.replace('PRICE_LEVEL_', '') }}
            </span>
          </div>
        </div>

        <!-- Botón -->
        <div class="mt-4 flex justify-center pb-1">
          <a 
            [href]="resto.googleMapsUri" 
            target="_blank"
            class="rounded-full bg-black text-white text-sm font-semibold px-7 h-9 flex items-center hover:bg-neutral-800 active:scale-[0.97] transition shadow-[0_8px_18px_-8px_rgba(0,0,0,0.45)]">
            Ver en Maps
          </a>
        </div>
      </article>
    </div>
  </section>
