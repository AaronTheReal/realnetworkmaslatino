  <!-- DYNAMIC GRID -->
  <section class="mt-8">
    <div *ngIf="loading()" class="text-center py-12">
      <p class="text-lg">Loading the World Cup matches in {{ city().name }}...</p>
    </div>

    <div *ngIf="error()" class="text-center py-12 text-red-600">
      {{ error() }}
    </div>

    <div *ngIf="!loading() && !error() && matches().length === 0" class="text-center py-12 text-neutral-500">
      There are no confirmed matches for {{ city().name }} yet.
    </div>

    <div *ngIf="!loading() && !error() && matches().length > 0"
         class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 sm:gap-6">

      <article *ngFor="let match of matches()"
               class="group rounded-3xl border border-neutral-200 bg-white p-5 sm:p-6 transition hover:-translate-y-1 hover:shadow-xl shadow-[0_1px_3px_rgba(0,0,0,0.05),0_10px_28px_-12px_rgba(0,0,0,0.14)]">

        <span class="inline-block rounded-full bg-[#fe0900]/10 text-[#fe0900] text-xs font-bold tracking-wide uppercase px-3 py-1">
          {{ match.stage }}
        </span>

        <div class="mt-3">
          <h3 class="text-lg sm:text-xl font-bold leading-tight">{{ match.teams.home }}</h3>
          <p class="text-sm text-neutral-400 font-semibold">vs</p>
          <h3 class="text-lg sm:text-xl font-bold leading-tight">{{ match.teams.away }}</h3>
        </div>

        <div class="mt-4 pt-4 border-t border-neutral-100 text-sm text-neutral-600 space-y-1">
          <p class="font-semibold">{{ formatDate(match.date) }}</p>
          <p>{{ match.stadium }}</p>
        </div>
      </article>
    </div>
  </section>
